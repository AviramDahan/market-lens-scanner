name: Market Lens Position Monitor

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Run immediately, bypassing the New York market-hours guard"
        required: false
        default: "false"
      ticker:
        description: "Optional live-trigger ticker"
        required: false
        default: ""
      event:
        description: "Optional live-trigger event"
        required: false
        default: ""
      source:
        description: "Optional trigger source"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: market-lens-repo-writes
  cancel-in-progress: false

jobs:
  monitor-positions:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check New York market-hours schedule
        id: schedule_time
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ] && [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          local_day="$(TZ=America/New_York date +%u)"
          local_hour="$(TZ=America/New_York date +%H)"
          local_minute="$(TZ=America/New_York date +%M)"
          local_minutes=$((10#$local_hour * 60 + 10#$local_minute))
          market_open=$((9 * 60 + 45))
          market_close=$((16 * 60))

          if [ "$local_day" -le 5 ] && [ "$local_minutes" -ge "$market_open" ] && [ "$local_minutes" -le "$market_close" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Outside New York market-hours monitor window; skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.schedule_time.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show trigger context
        if: steps.schedule_time.outputs.should_run == 'true'
        shell: bash
        run: |
          echo "trigger_source=${{ github.event.inputs.source || 'schedule-or-manual' }}"
          echo "trigger_ticker=${{ github.event.inputs.ticker || '' }}"
          echo "trigger_event=${{ github.event.inputs.event || '' }}"

      - name: Check for open positions
        if: steps.schedule_time.outputs.should_run == 'true'
        id: open_positions
        shell: bash
        run: |
          has_open="$(python3 agent/has_open_positions.py agent_tracker/market_lens_agent_portfolio_budget_100k.xlsx)"
          echo "has_open=$has_open" >> "$GITHUB_OUTPUT"
          if [ "$has_open" != "true" ]; then
            echo "No open positions; skipping monitor dependency install."
          fi

      - name: Set up Python
        if: steps.schedule_time.outputs.should_run == 'true' && steps.open_positions.outputs.has_open == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.schedule_time.outputs.should_run == 'true' && steps.open_positions.outputs.has_open == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run position monitor
        if: steps.schedule_time.outputs.should_run == 'true' && steps.open_positions.outputs.has_open == 'true'
        env:
          MARKET_LENS_EXCEL_PATH: agent_tracker/market_lens_agent_portfolio_budget_100k.xlsx
          MARKET_LENS_RUN_DIR: agent_results
          MARKET_LENS_MONITOR_PERIOD: 5d
          MARKET_LENS_MONITOR_INTERVAL: 1m
          MARKET_LENS_MONITOR_SAVE_NOOP: "false"
        run: python agent/position_monitor.py

      - name: Check monitor-generated changes
        if: steps.schedule_time.outputs.should_run == 'true' && steps.open_positions.outputs.has_open == 'true'
        id: monitor_changes
        shell: bash
        run: |
          changes="$(git status --porcelain -- agent_tracker/market_lens_agent_portfolio_budget_100k.xlsx agent_results)"
          if [ -z "$changes" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No position monitor changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "$changes"
          fi

      - name: Commit monitor results safely
        if: steps.schedule_time.outputs.should_run == 'true' && steps.open_positions.outputs.has_open == 'true' && steps.monitor_changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -e

          git config user.name "market-lens-agent"
          git config user.email "market-lens-agent@users.noreply.github.com"

          EXCEL_FILE="agent_tracker/market_lens_agent_portfolio_budget_100k.xlsx"
          RESULTS_DIR="agent_results"
          TEMP_DIR="/tmp/market_lens_monitor_generated"

          echo "Saving Monitor-generated files aside..."
          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          if [ -f "$EXCEL_FILE" ]; then
            mkdir -p "$TEMP_DIR/agent_tracker"
            cp "$EXCEL_FILE" "$TEMP_DIR/$EXCEL_FILE"
          fi

          if [ -d "$RESULTS_DIR" ]; then
            mkdir -p "$TEMP_DIR/$RESULTS_DIR"
            cp -R "$RESULTS_DIR"/. "$TEMP_DIR/$RESULTS_DIR"/
          fi

          echo "Moving local repo to latest origin/main..."
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

          echo "Restoring Monitor-generated files on top of latest main..."
          if [ -f "$TEMP_DIR/$EXCEL_FILE" ]; then
            mkdir -p "$(dirname "$EXCEL_FILE")"
            cp "$TEMP_DIR/$EXCEL_FILE" "$EXCEL_FILE"
          fi

          if [ -d "$TEMP_DIR/$RESULTS_DIR" ]; then
            mkdir -p "$RESULTS_DIR"
            cp -R "$TEMP_DIR/$RESULTS_DIR"/. "$RESULTS_DIR"/
          fi

          git add "$EXCEL_FILE" "$RESULTS_DIR"

          if git diff --cached --quiet; then
            echo "No position monitor changes to commit."
            exit 0
          fi

          git commit -m "Update Market Lens position monitor"

          echo "Pushing changes..."
          if ! git push origin HEAD:main; then
            echo "Push rejected because main changed. Retrying once on top of latest main..."

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            if [ -f "$TEMP_DIR/$EXCEL_FILE" ]; then
              mkdir -p "$(dirname "$EXCEL_FILE")"
              cp "$TEMP_DIR/$EXCEL_FILE" "$EXCEL_FILE"
            fi

            if [ -d "$TEMP_DIR/$RESULTS_DIR" ]; then
              mkdir -p "$RESULTS_DIR"
              cp -R "$TEMP_DIR/$RESULTS_DIR"/. "$RESULTS_DIR"/
            fi

            git add "$EXCEL_FILE" "$RESULTS_DIR"

            if git diff --cached --quiet; then
              echo "No position monitor changes to commit after retry."
              exit 0
            fi

            git commit -m "Update Market Lens position monitor"
            git push origin HEAD:main
          fi
