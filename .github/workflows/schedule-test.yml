name: Schedule Test

on:
  workflow_dispatch:
  schedule:
    # Test every 5 minutes. GitHub cron is UTC.
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Print schedule test
        run: |
          echo "Schedule works"
          echo "Event: ${{ github.event_name }}"
          date -u
