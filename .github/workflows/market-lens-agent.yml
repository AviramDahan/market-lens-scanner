name: Market Lens Paper Agent

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. The New York time guard below handles DST and exact scan times.
    - cron: "45 13,14 * * 1-5"
    - cron: "30 14-20 * * 1-5"
    - cron: "15 20,21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: market-lens-paper-agent
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check New York scan schedule
        id: schedule_time
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          local_day="$(TZ=America/New_York date +%u)"
          current_hour="$(TZ=America/New_York date +%H)"
          current_minute="$(TZ=America/New_York date +%M)"
          current_time="${current_hour}:${current_minute}"
          allowed_times="09:45 10:30 11:30 13:30 14:30 15:30 16:15"
          if [ "$local_day" -le 5 ] && [[ " $allowed_times " == *" $current_time "* ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not one of the configured New York scan times; skipping this scheduled trigger."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.schedule_time.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.schedule_time.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.schedule_time.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m playwright install --with-deps chromium

      - name: Run Market Lens UI agent
        if: steps.schedule_time.outputs.should_run == 'true'
        env:
          MARKET_LENS_URL: https://market-lens-scanner.onrender.com/?v=latest
          MARKET_LENS_EMAIL: ${{ secrets.MARKET_LENS_EMAIL }}
          MARKET_LENS_PASSWORD: ${{ secrets.MARKET_LENS_PASSWORD }}
          MARKET_LENS_EXCEL_PATH: agent_tracker/market_lens_agent_portfolio_budget_100k.xlsx
          MARKET_LENS_RUN_DIR: agent_results
          MARKET_LENS_UNIVERSE: smart-universe
          MARKET_LENS_TICKERS: ""
          MARKET_LENS_ANALYSIS_PERIOD: 6mo
          MARKET_LENS_MIN_RR: "2"
          MARKET_LENS_HEADLESS: "true"
          MARKET_LENS_AGENT_TIMEOUT_SECONDS: "900"
          MARKET_LENS_SKIP_COOLDOWN_HOURS: "8"
          MARKET_LENS_WATCH_CARRY_FORWARD_DAYS: "14"
        run: python agent/market_lens_ui_agent.py

      - name: Commit agent results
        if: steps.schedule_time.outputs.should_run == 'true'
        run: |
          git config user.name "market-lens-agent"
          git config user.email "market-lens-agent@users.noreply.github.com"
          git add agent_tracker/market_lens_agent_portfolio_budget_100k.xlsx agent_results
          if git diff --cached --quiet; then
            echo "No agent result changes to commit."
          else
            git commit -m "Update Market Lens paper agent results"
            git pull --rebase --autostash origin main
            git push origin HEAD:main
          fi
