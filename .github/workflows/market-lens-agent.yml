name: Market Lens Paper Agent Test

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Run immediately, bypassing the New York scan-time guard"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: market-lens-repo-writes
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check New York scan schedule
        id: schedule_time
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ] && [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          local_day="$(TZ=America/New_York date +%u)"
          local_time="$(TZ=America/New_York date +%H:%M)"

          should_run=false

          # Weekday off-hours staging scans plus regular-session confirmation scans.
          if [ "$local_day" -le 5 ]; then
            case "$local_time" in
              "06:30"|"08:30"|"09:10"|"09:45"|"10:30"|"11:30"|"13:30"|"14:30"|"15:30"|"16:15"|"16:20"|"18:30"|"20:15"|"22:30")
                should_run=true
                ;;
            esac
          fi

          # Weekend research/staging scans. These can stage WATCH_READY only, not BUY_SIMULATED.
          if [ "$local_day" = "6" ]; then
            case "$local_time" in
              "11:00")
                should_run=true
                ;;
            esac
          fi

          if [ "$local_day" = "7" ]; then
            case "$local_time" in
              "18:30"|"22:00")
                should_run=true
                ;;
            esac
          fi

          if [ "$should_run" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Outside configured New York scan times; skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.schedule_time.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.schedule_time.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.schedule_time.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m playwright install --with-deps chromium

      - name: Run Market Lens UI agent
        if: steps.schedule_time.outputs.should_run == 'true'
        env:
          MARKET_LENS_URL: https://market-lens-scanner-fb63.onrender.com/?v=latest
          MARKET_LENS_EMAIL: ${{ secrets.MARKET_LENS_EMAIL }}
          MARKET_LENS_PASSWORD: ${{ secrets.MARKET_LENS_PASSWORD }}
          MARKET_LENS_EXCEL_PATH: agent_tracker/market_lens_agent_portfolio_budget_100k.xlsx
          MARKET_LENS_RUN_DIR: agent_results
          MARKET_LENS_UNIVERSE: smart-universe
          MARKET_LENS_TICKERS: ""
          MARKET_LENS_ANALYSIS_PERIOD: 6mo
          MARKET_LENS_MIN_RR: "2"
          MARKET_LENS_HEADLESS: "true"
          MARKET_LENS_AGENT_TIMEOUT_SECONDS: "900"
          MARKET_LENS_AGENT_UNIVERSE_TARGET: "70"
          MARKET_LENS_AGENT_UNIVERSE_POOL: "70"
          MARKET_LENS_AGENT_MAX_PER_SECTOR: "15"
          MARKET_LENS_SKIP_COOLDOWN_HOURS: "8"
          MARKET_LENS_WATCH_CARRY_FORWARD_DAYS: "14"
          MARKET_LENS_BULL_MIN_SETUP_SCORE: "0.40"
          MARKET_LENS_NEUTRAL_MIN_SETUP_SCORE: "0.50"
          MARKET_LENS_MIN_PRIMARY_NET_RR: "0.80"
          MARKET_LENS_PREFERRED_PRIMARY_NET_RR: "1.00"
          MARKET_LENS_PRIMARY_RR_WEIGHT: "0.80"
          MARKET_LENS_STRETCH_RR_WEIGHT: "0.20"
          MARKET_LENS_MIN_TARGET1_ATR_DISTANCE: "0.75"
          MARKET_LENS_REQUIRE_ENTRY_CONFIRMATION: "true"
          MARKET_LENS_STOP_COOLDOWN_DAYS: "3"
          MARKET_LENS_COOLDOWN_EXCEPTION_SETUP_SCORE: "0.60"
          MARKET_LENS_COOLDOWN_EXCEPTION_NET_RR1: "1.20"
          MARKET_LENS_ALLOW_BUY_OUTSIDE_REGULAR_HOURS: "false"
          MARKET_LENS_SAVE_REJECTED_CHARTS: "false"
          MARKET_LENS_REJECTED_CHART_LIMIT: "5"
          MARKET_LENS_REJECTED_CHART_MIN_SCORE: "0.40"
        run: python agent/market_lens_ui_agent.py

      - name: Commit agent results safely
        if: steps.schedule_time.outputs.should_run == 'true'
        shell: bash
        run: |
          set -e

          git config user.name "market-lens-agent"
          git config user.email "market-lens-agent@users.noreply.github.com"

          EXCEL_FILE="agent_tracker/market_lens_agent_portfolio_budget_100k.xlsx"
          RESULTS_DIR="agent_results"
          TEMP_DIR="/tmp/market_lens_agent_generated"

          echo "Saving Agent-generated files aside..."
          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          if [ -f "$EXCEL_FILE" ]; then
            mkdir -p "$TEMP_DIR/agent_tracker"
            cp "$EXCEL_FILE" "$TEMP_DIR/$EXCEL_FILE"
          fi

          if [ -d "$RESULTS_DIR" ]; then
            mkdir -p "$TEMP_DIR/$RESULTS_DIR"
            cp -R "$RESULTS_DIR"/. "$TEMP_DIR/$RESULTS_DIR"/
          fi

          echo "Moving local repo to latest origin/main..."
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

          echo "Restoring Agent-generated files on top of latest main..."
          if [ -f "$TEMP_DIR/$EXCEL_FILE" ]; then
            mkdir -p "$(dirname "$EXCEL_FILE")"
            cp "$TEMP_DIR/$EXCEL_FILE" "$EXCEL_FILE"
          fi

          if [ -d "$TEMP_DIR/$RESULTS_DIR" ]; then
            mkdir -p "$RESULTS_DIR"
            cp -R "$TEMP_DIR/$RESULTS_DIR"/. "$RESULTS_DIR"/
          fi

          git add "$EXCEL_FILE" "$RESULTS_DIR"

          if git diff --cached --quiet; then
            echo "No agent result changes to commit."
            exit 0
          fi

          git commit -m "Update Market Lens paper agent results"

          echo "Pushing changes..."
          if ! git push origin HEAD:${GITHUB_REF_NAME:-main}; then
            echo "Push rejected because main changed. Retrying once on top of latest main..."

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            if [ -f "$TEMP_DIR/$EXCEL_FILE" ]; then
              mkdir -p "$(dirname "$EXCEL_FILE")"
              cp "$TEMP_DIR/$EXCEL_FILE" "$EXCEL_FILE"
            fi

            if [ -d "$TEMP_DIR/$RESULTS_DIR" ]; then
              mkdir -p "$RESULTS_DIR"
              cp -R "$TEMP_DIR/$RESULTS_DIR"/. "$RESULTS_DIR"/
            fi

            git add "$EXCEL_FILE" "$RESULTS_DIR"

            if git diff --cached --quiet; then
              echo "No agent result changes to commit after retry."
              exit 0
            fi

            git commit -m "Update Market Lens paper agent results"
            git push origin HEAD:${GITHUB_REF_NAME:-main}
          fi
